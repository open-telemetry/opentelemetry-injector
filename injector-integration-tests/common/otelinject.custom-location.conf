dotnet_auto_instrumentation_agent_path_prefix = /path/from/config-file-custom-location/dotnet
jvm_auto_instrumentation_agent_path = /path/from/config-file-custom-location/jvm/javaagent.jar
nodejs_auto_instrumentation_agent_path = /path/from/config-file-custom-location/nodejs/node_modules/@opentelemetry/auto-instrumentations-node/build/src/register.js
python_auto_instrumentation_agent_path_prefix = /path/from/config-file-custom-location/python
all_auto_instrumentation_agents_env_path = /etc/opentelemetry/default_auto_instrumentation_env.conf
# */dotnetapp is added here to cover the self-contained .NET executable used in the integration tests.
# It is not part of the default include_paths in the packaged otelinject.conf, which only includes */dotnet
# (the dotnet CLI). Self-contained .NET executables have arbitrary names and cannot be covered by a default.
include_paths = */java,*/node,*/nodejs,*/dotnet,*/dotnetapp,*/python*
