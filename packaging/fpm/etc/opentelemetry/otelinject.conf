all_auto_instrumentation_agents_env_path=/etc/opentelemetry/default_auto_instrumentation_env.conf
dotnet_auto_instrumentation_agent_path_prefix=/usr/lib/opentelemetry/dotnet
jvm_auto_instrumentation_agent_path=/usr/lib/opentelemetry/jvm/javaagent.jar
nodejs_auto_instrumentation_agent_path=/usr/lib/opentelemetry/nodejs/node_modules/@opentelemetry/auto-instrumentations-node/build/src/register.js
# Only instrument processes that are likely candidates for auto-instrumentation. This avoids injecting
# environment variables into unrelated system processes. To instrument additional processes, add their
# executable path patterns here, or override this setting via OTEL_INJECTOR_INCLUDE_PATHS.
# Note: the * wildcard matches path separators, so */java matches /usr/bin/java and /opt/jdk/bin/java.
#
# Python is included so that setting python_auto_instrumentation_agent_path_prefix is sufficient to
# enable Python auto-instrumentation without any additional configuration changes.
#
# .NET limitation: */dotnet only covers framework-dependent deployments run via the dotnet CLI
# (e.g. dotnet myapp.dll). Self-contained .NET executables are compiled to a native binary with an
# arbitrary name chosen by the developer (e.g. myservice, webapi) and cannot be covered by a default
# pattern. If you are deploying self-contained .NET executables, add their names to include_paths.
include_paths=*/java,*/node,*/nodejs,*/dotnet,*/python*
